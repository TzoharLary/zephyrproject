        - name: "Model Number String"
          uuid: "0x2A24"
          properties: [Read]
          mandatory: false
        - name: "Serial Number String"
          uuid: "0x2A25"
          properties: [Read]
          mandatory: false
        - name: "Hardware Revision String"
          uuid: "0x2A27"
          properties: [Read]
          mandatory: false
        - name: "Firmware Revision String"
          uuid: "0x2A26"
          properties: [Read]
          mandatory: false
        - name: "Software Revision String"
          uuid: "0x2A28"
          properties: [Read]
          mandatory: false
        - name: "System ID"
          uuid: "0x2A23"
          properties: [Read]
          mandatory: false
        - name: "PnP ID"
          uuid: "0x2A50"
          properties: [Read]
          mandatory: false
