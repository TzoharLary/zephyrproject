    tags: [health, sensor, indicate, notify, temperature, mixed, uses_indicate]
    notes: "Uses Indicate (acknowledged notify). Good reference for indicate-based profiles. Measurement Interval supports Read+Write+Indicate — server can indicate when interval changes. Pattern for indicate-based medical measurement: see profile-patterns.md §10.2."

