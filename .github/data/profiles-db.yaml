# Zephyr BLE GATT Profile Database
# ===================================
# This file contains metadata for every existing Zephyr BLE GATT Profile.
# Used by the zephyr-bt-profile-builder agent for classification and generation.
#
# Schema version: 1.0.0

version: "1.1.0"
last_updated: "2026-02-25"

# Phase 1 validation status:
# Batch 1 (HRS, BAS, DIS, HTS, ESS, OTS):
#   - Deep UUID verification: all 6 UUIDs verified against BT SIG Assigned Numbers
#   - HRS: complexity corrected Low→Medium (3 chars); has_control_point corrected false→true (HR CP 0x2A39)
#   - DIS: spec_version v1.2 + docs/profiles/DIS/ cross-ref added
#   - BAS: spec_version v1.1 + docs/profiles/BAS/ cross-ref added; spec_doc added
#   - HTS: confirmed correct; Indicate-based pattern note added
#   - ESS: confirmed correct; note added about 40+ optional characteristics in full BT SIG spec
#   - OTS: confirmed correct; pts_tracked added (ots.py in Auto-PTS)
# Batch 2–4: pending
# Coverage audit: BPS (0x1810) added — present in docs/profiles/BPS/ and tools/data/ but was missing
# Technical tags added: has_control_point, uses_indicate, per_connection_state_required

profiles:

  - name: "Heart Rate Service"
    id: HRS
    category: Health
    type: Simple
    complexity: Medium
    pattern: Notify
    uuids:
      service: "0x180D"
      characteristics:
        - name: "Heart Rate Measurement"
          uuid: "0x2A37"
          properties: [Notify]
          mandatory: true
        - name: "Body Sensor Location"
          uuid: "0x2A38"
          properties: [Read]
          mandatory: false
        - name: "Heart Rate Control Point"
          uuid: "0x2A39"
          properties: [Write]
          mandatory: false
    callbacks: true
    state_management: false
    has_control_point: true
    uses_indicate: false
    per_connection_state_required: false
    kconfig_symbol: BT_HRS
    spec_version: "1.0"
    spec_doc: "docs/profiles/HRS/Heart_Rate_Service_1.0.pdf"
    pts_tracked: true
    reference_files:
      header: "include/zephyr/bluetooth/services/hrs.h"
      impl: "subsys/bluetooth/services/hrs.c"
    similar_profiles: [BAS, DIS]
    tags: [health, sensor, notify, simple, heart, vital-signs, has_control_point]
    notes: "Canonical simple notify profile. Best starting reference for any notify-based sensor. HR Control Point (0x2A39) resets Energy Expended field (optional feature, present in spec — has_control_point: true). complexity: Medium per 3-char rule (analogous to CTS at 3 chars)."

