    similar_profiles: [HRS, DIS]
    tags: [power, battery, read, notify, simple, sensor]
    notes: "Simple read/notify profile. Good reference for combined read+notify characteristics. BAS v1.1 added 11 optional characteristics (Battery Level Status, Estimated Service Date, etc.) — basic implementation covers v1.0 Battery Level only. UUID verified against docs/profiles/BAS/Battery_Service_1.1.pdf."

