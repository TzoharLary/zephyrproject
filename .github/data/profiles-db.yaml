    spec_version: "1.2"
    spec_doc: "docs/profiles/DIS/Device_Information_Service_1.2.pdf"
    pts_tracked: true
    reference_files:
      header: "include/zephyr/bluetooth/services/dis.h"
      impl: "subsys/bluetooth/services/dis.c"
    similar_profiles: [BAS]
    tags: [device, info, read-only, simple, no-callback, static]
    notes: "Pure read-only profile. Values configured via Kconfig. No callbacks needed. 8 optional characteristics (all optional per DIS v1.2 spec). UUID verified against docs/profiles/DIS/Device_Information_Service_1.2.pdf."

