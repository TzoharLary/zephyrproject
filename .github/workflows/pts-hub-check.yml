name: PTS Hub Checks

on:
  push:
    paths:
      - "tools/group_b_hub_data.py"
      - "tools/autopts_guide_data.py"
      - "tools/build_pts_report_bundle.py"
      - "tools/check_group_b_hub.py"
      - "tools/templates/pts_report_he/**"
      - "tools/data/group_b_*.json"
      - "docs/profiles/BPS/**"
      - "docs/profiles/WSS/**"
      - "docs/profiles/SCPS/**"
      - "dashboards/pts_report_he/**"
      - ".github/workflows/pts-hub-check.yml"
  pull_request:
    paths:
      - "tools/group_b_hub_data.py"
      - "tools/autopts_guide_data.py"
      - "tools/build_pts_report_bundle.py"
      - "tools/check_group_b_hub.py"
      - "tools/templates/pts_report_he/**"
      - "tools/data/group_b_*.json"
      - "docs/profiles/BPS/**"
      - "docs/profiles/WSS/**"
      - "docs/profiles/SCPS/**"
      - "dashboards/pts_report_he/**"
      - ".github/workflows/pts-hub-check.yml"
  workflow_dispatch:

jobs:
  validate-pts-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          pdftotext -v

      - name: Python syntax checks
        run: |
          python -m py_compile tools/group_b_hub_data.py tools/autopts_guide_data.py tools/build_pts_report_bundle.py

      - name: JS syntax checks
        run: |
          node --check tools/templates/pts_report_he/autopts/report.js
          node --check tools/templates/pts_report_he/report.js

      - name: Group B Hub schema/content checks
        run: |
          python tools/check_group_b_hub.py

      - name: Build dashboard + hub bundles
        run: |
          python tools/build_pts_report_bundle.py

      - name: Verify generated bundle snapshots remain valid
        run: |
          python tools/check_group_b_hub.py --allow-threshold-fail
